apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-device-plugin
  namespace: kube-system
  labels:
    app: kata-device-plugin
spec:
  selector:
    matchLabels:
      app: kata-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: kata-device-plugin
    spec:
      priorityClassName: system-node-critical

      # Only run on nodes where GFD has confirmed GPU presence.
      nodeSelector:
        nvidia.com/gpu.present: "true"

      # The plugin must start before workload pods on the node.
      tolerations:
        - operator: Exists
          effect: NoSchedule

      containers:
        - name: kata-device-plugin
          image: kata-device-plugin:latest
          imagePullPolicy: IfNotPresent

          # No privileged flag, no added capabilities — ADR 10000.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # cdi_dir write requires writable fs
            runAsNonRoot: false             # kubelet socket ownership may require uid 0
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: kubelet-socket
              mountPath: /var/lib/kubelet/device-plugins
            - name: vfio
              mountPath: /dev/vfio
              readOnly: true
            - name: cdi
              mountPath: /var/run/cdi

          resources:
            requests:
              cpu: 10m
              memory: 20Mi
            limits:
              cpu: 100m
              memory: 64Mi

      volumes:
        - name: kubelet-socket
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: vfio
          hostPath:
            path: /dev/vfio
            type: DirectoryOrCreate
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
