on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

name: Static checks
jobs:
  # Detect if only docs changed - skip CI if so
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/*.toml'
              - '**/*.lock'
              - 'Cargo.lock'
              - 'proto/**'
              - '.github/workflows/static-checks.yaml'
              - '.github/actions/**'

  # Run unit and integration tests
  test:
    name: cargo test
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # tonic codegen in build.rs needs protoc.
      - run: sudo apt-get install -y protobuf-compiler

      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain

      - run: cargo test --locked --all-features -- --include-ignored

  # Check code formatting against Rust style guidelines
  formatting:
    name: cargo fmt
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  # Lint for common mistakes and style issues
  linting:
    name: cargo clippy
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # tonic codegen in build.rs needs protoc.
      - run: sudo apt-get install -y protobuf-compiler

      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain
        with:
          components: clippy

      - run: cargo clippy --locked --all-features --all-targets -- -D warnings

  # Check dependencies for known security vulnerabilities
  security:
    name: cargo audit
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain

      - run: cargo install cargo-audit --locked
      - run: cargo audit

  # Verify licenses, check for banned dependencies, and audit sources
  deny:
    name: cargo deny
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain

      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  # Detect unused dependencies in Cargo.toml
  unused-deps:
    name: cargo udeps
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # tonic codegen in build.rs needs protoc.
      - run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master 2026-06-30
        with:
          toolchain: nightly

      # +nightly: a bare cargo install would pull the pinned toolchain
      - run: cargo +nightly install cargo-udeps --locked
      # +nightly outranks rust-toolchain.toml; udeps needs nightly-only -Z flags
      - run: cargo +nightly udeps --locked --all-features --all-targets

  # Analyze binary size and identify largest functions
  bloat:
    name: cargo bloat
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # tonic codegen in build.rs needs protoc.
      - run: sudo apt-get install -y protobuf-compiler

      - name: Install pinned Rust toolchain
        uses: ./.github/actions/rust-toolchain

      - run: cargo install cargo-bloat --locked
      - run: cargo bloat --locked --release --all-features -n 20

  # No miri job (unlike NVRC): this crate forbids unsafe_code at compile
  # time, and miri cannot interpret tempfile/tokio in the test harness.
